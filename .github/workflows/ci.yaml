name: CI

on:
  pull_request:
    branches:
    - '*'
  push:
    branches:
    - master

defaults:
  run:
    shell: bash

env:
  RUSTFLAGS: --deny warnings

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        cache: false
        components: clippy, rustfmt

    - uses: Swatinem/rust-cache@v2
      with:
        cache-bin: false
        prefix-key: v1-rust

    - name: Clippy
      run: cargo clippy --all --all-targets

    - name: Format
      run: cargo fmt --all -- --check

  msrv:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        cache: false

    - uses: Swatinem/rust-cache@v2
      with:
        cache-bin: false
        prefix-key: v1-rust

    - name: Check
      run: cargo check

  parsers:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        cache: false

    - uses: Swatinem/rust-cache@v2
      with:
        cache-bin: false
        prefix-key: v1-rust

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Web Dependencies
      working-directory: ./www
      run: bun install

    - name: Check Parsers
      run: cargo run -- check

  test:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest

    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@v6

    - name: Remove Broken WSL bash executable
      if: ${{ matrix.os == 'windows-latest' }}
      shell: cmd
      run: |
        takeown /F C:\Windows\System32\bash.exe
        icacls C:\Windows\System32\bash.exe /grant administrators:F
        del C:\Windows\System32\bash.exe

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        cache: false

    - uses: Swatinem/rust-cache@v2
      with:
        cache-bin: false
        prefix-key: v1-rust

    - name: Test
      run: cargo test --all --all-targets
